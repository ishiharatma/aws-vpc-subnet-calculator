var lang = (navigator.language || navigator.userLanguage || 'ja').startsWith('ja') ? 'ja' : 'en';

function t(key, a, b) {
  var val = i18n[lang][key];
  return typeof val === 'function' ? val(a, b) : val;
}

function applyLang() {
  document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('secVpc').textContent = t('secVpc');
  document.getElementById('secOptions').textContent = t('secOptions');
  document.getElementById('secTiers').textContent = t('secTiers');
  document.getElementById('labelTgw').textContent = t('labelTgw');
  document.getElementById('labelShowFree').textContent = t('labelShowFree');
  document.getElementById('btnAddTier').textContent = t('btnAddTier');
  document.getElementById('btnCalc').textContent = t('btnCalc');
  document.getElementById('vpcCidr').placeholder = t('vpcCidrPlaceholder');
  document.getElementById('btnJa').classList.toggle('active', lang === 'ja');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
}

function setLang(l) {
  lang = l;
  applyLang();
  renderTiers();
  calculate(false);
}

  { name: 'Private-App',  mask: 24 },
  { name: 'Public',       mask: 26 },
  { name: 'Private-DB',   mask: 26 },
  { name: 'VPCEndpoint',  mask: 26 },
  { name: 'TGW',          mask: 28 },
];

const TIER_COLORS = [
  '#2d7d4f','#1a6fd4','#5c3d99','#a05c00','#8b2020',
  '#1a7a7a','#6b4c00','#3d5a99','#7a2d6b','#3d7a2d',
];
function tierColor(idx) { return TIER_COLORS[idx % TIER_COLORS.length]; }
function isTgw(name) { return document.getElementById('tgwTailMode').checked && name.includes('TGW'); }

function maskOptions(selected) {
  var opts = '';
  for (var m = 16; m <= 28; m++) {
    var count = Math.pow(2, 32 - m);
    opts += '<option value="' + m + '"' + (m === selected ? ' selected' : '') + '>/' + m + ' (' + count.toLocaleString() + ')</option>';
  }
  return opts;
}

function renderTiers() {
  var tgwOn = document.getElementById('tgwTailMode').checked;
  var tierHintEl = document.getElementById('tierHint');
  tierHintEl.style.display = tgwOn ? '' : 'none';
  tierHintEl.textContent = t('tierHint');
  document.getElementById('tierList').innerHTML = tiers.map(function(tier, i) {
    var h = Math.pow(2, 32 - tier.mask) - 5;
    var hint = h > 0 ? t('hostsHint', h) : '';
    var tgwMark = tgwOn && tier.name.includes('TGW') ? '<span class="tgw-tag">' + t('tgwTag') + '</span>' : '';
    return '<div class="tier-row" draggable="true" data-idx="' + i + '"' +
      ' ondragstart="tierDragStart(' + i + ',event)"' +
      ' ondragover="tierDragOver(' + i + ',event)"' +
      ' ondrop="tierDrop(' + i + ',event)"' +
      ' ondragend="tierDragEnd(event)">' +
      '<span class="tier-drag-handle" title="' + t('dragTitle') + '"><span class="material-icons" style="font-size:18px">drag_indicator</span></span>' +
      '<span style="font-size:12px;color:var(--text-hint);min-width:16px">' + (i+1) + '</span>' +
      '<input type="text" class="tier-name" value="' + tier.name + '" onchange="tiers[' + i + '].name=this.value;renderTiers();" placeholder="' + t('tierPlaceholder') + '" />' +
      '<span style="font-size:12px;color:var(--text-muted)">/</span>' +
      '<select class="tier-mask" onchange="updateMask(' + i + ',this.value)">' + maskOptions(tier.mask) + '</select>' +
      '<span class="hosts-hint">' + hint + '</span>' +
      tgwMark +
      '<button class="btn btn-del" onclick="delTier(' + i + ')" title="' + t('delTitle') + '"><span class="material-icons">delete</span></button>' +
      '</div>';
  }).join('');
}

function updateMask(i, val) { tiers[i].mask = parseInt(val) || 24; renderTiers(); }
function addTier() { tiers.push({ name: t('newTierName'), mask: 28 }); renderTiers(); }
function delTier(i) { tiers.splice(i, 1); renderTiers(); }

var _dragSrc = null;
function tierDragStart(i, e) {
  _dragSrc = i;
  e.dataTransfer.effectAllowed = 'move';
  var row = e.currentTarget;
  setTimeout(function() { if (row) row.classList.add('dragging'); }, 0);
}
function tierDragOver(i, e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (_dragSrc === null || _dragSrc === i) return;
  document.querySelectorAll('.tier-row').forEach(function(r, idx) {
    r.classList.remove('drag-over-top', 'drag-over-bottom');
    if (idx === i) r.classList.add(i < _dragSrc ? 'drag-over-top' : 'drag-over-bottom');
  });
}
function tierDrop(i, e) {
  e.preventDefault();
  if (_dragSrc === null || _dragSrc === i) { tierDragEnd(e); return; }
  var moved = tiers.splice(_dragSrc, 1)[0];
  tiers.splice(i, 0, moved);
  _dragSrc = null;
  renderTiers();
}
function tierDragEnd(e) {
  _dragSrc = null;
  document.querySelectorAll('.tier-row').forEach(function(r) { r.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom'); });
}

function parseVPC(cidr) {
  var m = cidr.trim().match(/^(\d+\.\d+\.\d+\.\d+)\/(\d+)$/);
  if (!m) return null;
  var parts = m[1].split('.').map(Number);
  if (parts.some(function(p) { return p < 0 || p > 255; })) return null;
  var prefix = parseInt(m[2]);
  if (prefix < 8 || prefix > 28) return null;
  var base = ((parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3]) >>> 0;
  var total = Math.pow(2, 32 - prefix);
  var network = (base & (~((1 << (32 - prefix)) - 1) >>> 0)) >>> 0;
  return { base: network, prefix: prefix, total: total, end: network + total - 1 };
}

function ipToStr(n) { return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'); }
function floorAligned(addr, size) { return Math.floor(addr / size) * size; }

var toastTimer = null;
function showToast(message) {
  var toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = message;
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 1500);
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === name); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.dataset.panel === name); });
}

function calculate(notify) {
  if (notify === undefined) notify = true;
  var cidr = document.getElementById('vpcCidr').value;
  var vpc = parseVPC(cidr);
  var errEl = document.getElementById('vpcErr');
  if (!vpc) { errEl.textContent = t('errInvalidCidr'); return; }
  errEl.textContent = '';

  if (tiers.length === 0) { document.getElementById('result').innerHTML = '<div class="warn">' + t('warnNoTier') + '</div>'; return; }
  for (var ti = 0; ti < tiers.length; ti++) {
    var tier = tiers[ti];
    if (tier.mask <= vpc.prefix || tier.mask < 16 || tier.mask > 28) {
      document.getElementById('result').innerHTML = '<div class="warn">' + t('warnBadMask', tier.name, tier.mask, vpc.prefix) + '</div>'; return;
    }
  }

  var normalTiers = tiers.filter(function(tier) { return !isTgw(tier.name); });
  var tgwTiers    = tiers.filter(function(tier) { return  isTgw(tier.name); });
  var AZS = ['1a', '1c'];
  var allocRows = [];
  var overflow = false;

  var fwdCursor = vpc.base;
  for (var ni = 0; ni < normalTiers.length; ni++) {
    var ntier = normalTiers[ni];
    var sz = Math.pow(2, 32 - ntier.mask);
    for (var az = 0; az < 2; az++) {
      var aligned = Math.ceil(fwdCursor / sz) * sz;
      var end = aligned + sz - 1;
      if (end > vpc.end) { overflow = true; break; }
      allocRows.push({ kind:'subnet', tier: ntier.name, az: AZS[az], azIdx: az,
        cidr: ipToStr(aligned) + '/' + ntier.mask, first: ipToStr(aligned), last: ipToStr(end),
        total: sz, usable: sz-5, tail: false, startNum: aligned, endNum: end });
      fwdCursor = end + 1;
    }
    if (overflow) break;
  }

  var bwdCursor = vpc.end;
  var tgwBuilt = [];
  var tgwRev = tgwTiers.slice().reverse();
  for (var gi = 0; gi < tgwRev.length; gi++) {
    var gtier = tgwRev[gi];
    var gsz = Math.pow(2, 32 - gtier.mask);
    for (var gaz = 1; gaz >= 0; gaz--) {
      var galigned = floorAligned(bwdCursor - gsz + 1, gsz);
      var gend = galigned + gsz - 1;
      if (galigned < vpc.base) { overflow = true; break; }
      tgwBuilt.unshift({ kind:'subnet', tier: gtier.name, az: AZS[gaz], azIdx: gaz,
        cidr: ipToStr(galigned) + '/' + gtier.mask, first: ipToStr(galigned), last: ipToStr(gend),
        total: gsz, usable: gsz-5, tail: true, startNum: galigned, endNum: gend });
      bwdCursor = galigned - 1;
    }
    if (overflow) break;
  }

  var fwdEnd   = allocRows.length > 0 ? allocRows[allocRows.length-1].endNum : vpc.base - 1;
  var tgwStart = tgwBuilt.length  > 0 ? tgwBuilt[0].startNum               : vpc.end  + 1;
  var collision = allocRows.length > 0 && tgwBuilt.length > 0 && fwdEnd >= tgwStart;
  var allSubnets = allocRows.concat(tgwBuilt).sort(function(a,b) { return a.startNum - b.startNum; });

  var gaps = [];
  var cursor = vpc.base;
  for (var si = 0; si < allSubnets.length; si++) {
    var s = allSubnets[si];
    if (s.startNum > cursor) gaps.push({ kind:'free', startNum: cursor, endNum: s.startNum-1 });
    cursor = s.endNum + 1;
  }
  if (cursor <= vpc.end) gaps.push({ kind:'free', startNum: cursor, endNum: vpc.end });

  var totalFree = gaps.reduce(function(a,g) { return a+(g.endNum-g.startNum+1); }, 0);
  var usedCount = vpc.total - totalFree;
  var freePct   = Math.round(totalFree/vpc.total*100);
  var showFree  = document.getElementById('showFree').checked;

  var tableRows = [];
  cursor = vpc.base;
  for (var sri = 0; sri < allSubnets.length; sri++) {
    var sr = allSubnets[sri];
    if (showFree && sr.startNum > cursor) tableRows.push({ kind:'free', startNum: cursor, endNum: sr.startNum-1 });
    tableRows.push(sr);
    cursor = sr.endNum + 1;
  }
  if (showFree && cursor <= vpc.end) tableRows.push({ kind:'free', startNum: cursor, endNum: vpc.end });

  function buildDiagramColumn(azIdx) {
    var azSubnets = allSubnets.filter(function(s) { return s.azIdx === azIdx; });
    var events = azSubnets.concat(showFree ? gaps : []);
    events.sort(function(a,b) { return a.startNum - b.startNum; });
    return events;
  }

  var warns = '';
  if (overflow) warns += '<div class="warn">' + t('warnOverflow') + '</div>';
  if (collision) warns += '<div class="warn">' + t('warnCollision') + '</div>';

  var summary = '<div class="info-row">' +
    '<div class="info-card"><div class="lbl">' + t('lblVpcCidr') + '</div><div class="val">' + cidr + '</div></div>' +
    '<div class="info-card"><div class="lbl">' + t('lblIpRange') + '</div><div class="val" style="font-size:13px">' + ipToStr(vpc.base) + ' – ' + ipToStr(vpc.end) + '</div></div>' +
    '<div class="info-card"><div class="lbl">' + t('lblTotal') + '</div><div class="val">' + vpc.total.toLocaleString() + '</div></div>' +
    '<div class="info-card"><div class="lbl">' + t('lblUsed') + '</div><div class="val">' + usedCount.toLocaleString() + '</div></div>' +
    '<div class="info-card"><div class="lbl">' + t('lblFree') + '</div><div class="val" style="color:var(--success-text)">' + totalFree.toLocaleString() + ' (' + freePct + '%)</div></div>' +
    '</div>';

  var freeBanner = '';
  if (showFree && gaps.length > 0) {
    freeBanner = '<div class="free-banner">' + gaps.map(function(g) {
      var cnt = g.endNum-g.startNum+1;
      return '<div class="fb-row"><span class="mono">' + ipToStr(g.startNum) + ' – ' + ipToStr(g.endNum) + '</span><strong>' + cnt.toLocaleString() + ' ' + t('addrUnit') + '</strong></div>';
    }).join('') + '</div>';
  }

  var tableHTML = '<div class="table-wrap"><table>' +
    '<colgroup><col style="width:18%"><col style="width:6%"><col style="width:17%"><col style="width:14%"><col style="width:14%"><col style="width:9%"><col style="width:9%"><col style="width:9%"></colgroup>' +
    '<thead><tr>' +
    '<th>' + t('thTier') + '</th><th>' + t('thAz') + '</th><th>' + t('thCidr') + '</th>' +
    '<th>' + t('thFirst') + '</th><th>' + t('thLast') + '</th>' +
    '<th style="text-align:right">' + t('thTotalCount') + '</th>' +
    '<th style="text-align:right">' + t('thUsable') + '</th>' +
    '<th>' + t('thAssign') + '</th>' +
    '</tr></thead><tbody>';
  for (var ri = 0; ri < tableRows.length; ri++) {
    var r = tableRows[ri];
    if (r.kind === 'free') {
      var cnt = r.endNum-r.startNum+1;
      tableHTML += '<tr style="background:var(--success-bg);color:var(--success-text);font-style:italic;font-size:11px">' +
        '<td colspan="2">' + t('freeLabel') + '</td><td class="mono">—</td>' +
        '<td class="mono">' + ipToStr(r.startNum) + '</td><td class="mono">' + ipToStr(r.endNum) + '</td>' +
        '<td style="text-align:right" class="mono">' + cnt.toLocaleString() + '</td>' +
        '<td style="text-align:right" class="mono">—</td>' +
        '<td><span class="badge badge-free">' + t('badgeFree') + '</span></td>' +
        '</tr>';
    } else {
      tableHTML += '<tr>' +
        '<td style="font-weight:500">' + r.tier + '</td>' +
        '<td><span class="badge ' + (r.azIdx===0?'badge-az1':'badge-az2') + '">' + r.az + '</span></td>' +
        '<td class="mono">' + r.cidr + '</td>' +
        '<td class="mono" style="font-size:11px;color:var(--text-muted)">' + r.first + '</td>' +
        '<td class="mono" style="font-size:11px;color:var(--text-muted)">' + r.last + '</td>' +
        '<td style="text-align:right" class="mono">' + r.total.toLocaleString() + '</td>' +
        '<td style="text-align:right" class="mono">' + r.usable.toLocaleString() + '</td>' +
        '<td><span class="badge ' + (r.tail?'badge-tail':'badge-fwd') + '">' + (r.tail?t('badgeTail'):t('badgeFwd')) + '</span></td>' +
        '</tr>';
    }
  }
  tableHTML += '</tbody></table></div><p style="font-size:11px;color:var(--text-hint);margin-top:8px">' + t('tableNote') + '</p>';

  var tierNames = [];
  allSubnets.forEach(function(s) { if (tierNames.indexOf(s.tier) < 0) tierNames.push(s.tier); });
  var colorMap = {};
  tierNames.forEach(function(name, i) { colorMap[name] = tierColor(i); });

  function renderCard(c) {
    if (c.kind === 'free') {
      var cnt = c.endNum-c.startNum+1;
      return '<div class="free-card"><div class="sc-name">' + t('freeCardName') + '</div><div class="sc-info">' + ipToStr(c.startNum) + ' – ' + ipToStr(c.endNum) + '<br>' + cnt.toLocaleString() + ' ' + t('addrUnit') + '</div></div>';
    }
    var col = colorMap[c.tier] || '#555';
    return '<div class="subnet-card" style="background:' + col + '"><div class="sc-name">' + c.tier + '</div><div class="sc-cidr">' + c.cidr + '</div><div class="sc-info">' + t('addrUsable', c.total, c.usable) + '<br>' + c.first + ' – ' + c.last + '</div></div>';
  }

  var col0 = buildDiagramColumn(0);
  var col1 = buildDiagramColumn(1);

  var diagramFooter = '';
  if (gaps.length > 0 && showFree) {
    diagramFooter = '<div class="diagram-footer">' + t('diagramFooterPrefix') + ' ' +
      gaps.map(function(g) { return ipToStr(g.startNum) + ' – ' + ipToStr(g.endNum); }).join(' / ') +
      ' ' + t('diagramFooterSuffix') + '</div>';
  }

  var diagramHTML = '<div class="diagram">' +
    '<div class="diagram-header">VPC: ' + cidr + '</div>' +
    '<div class="diagram-total">' + vpc.total.toLocaleString() + ' addresses</div>' +
    '<div class="az-grid">' +
    '<div class="az-col"><div class="az-label">AZ-a (ap-northeast-1a)</div>' + col0.map(renderCard).join('') + '</div>' +
    '<div class="az-col"><div class="az-label">AZ-c (ap-northeast-1c)</div>' + col1.map(renderCard).join('') + '</div>' +
    '</div>' + diagramFooter + '</div>';

  document.getElementById('result').innerHTML =
    warns + summary + freeBanner +
    '<div class="tab-bar">' +
    '<button class="tab-btn active" data-tab="table" onclick="switchTab(\'table\')">' + t('tabTable') + '</button>' +
    '<button class="tab-btn" data-tab="diagram" onclick="switchTab(\'diagram\')">' + t('tabDiagram') + '</button>' +
    '</div>' +
    '<div class="tab-panel active" data-panel="table">' + tableHTML + '</div>' +
    '<div class="tab-panel" data-panel="diagram"><div class="diagram-wrap">' + diagramHTML + '</div></div>';

  if (notify) showToast(t('toastCalc'));
}

applyLang();
renderTiers();
calculate(false);
</script>
</body>
</html>
