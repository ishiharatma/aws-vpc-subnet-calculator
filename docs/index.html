<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS VPC サブネット CIDR 計算ツール</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-alt: #f0f0f0;
    --border: #d0d0d0;
    --border-strong: #b0b0b0;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-hint: #999999;
    --radius: 6px;
    --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --accent: #1a6fd4;
    --accent-bg: #e6f1fb;
    --accent-text: #0c447c;
    --pro-bg: #eeedfe;
    --pro-text: #3c3489;
    --warning-bg: #faeeda;
    --warning-text: #633806;
    --warning-border: #ef9f27;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-border: #639922;
    --danger: #c0392b;
    --danger-bg: #fdecea;
    --danger-border: #e74c3c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #2a2a2a;
      --surface-alt: #222222;
      --border: #3a3a3a;
      --border-strong: #505050;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --text-hint: #686868;
      --accent: #4a9edd;
      --accent-bg: #0c2a45;
      --accent-text: #85b7eb;
      --pro-bg: #1e1a3a;
      --pro-text: #afa9ec;
      --warning-bg: #2a1f00;
      --warning-text: #fac775;
      --warning-border: #854f0b;
      --success-bg: #172404;
      --success-text: #97c459;
      --success-border: #3b6d11;
      --danger: #e57373;
      --danger-bg: #2a1010;
      --danger-border: #a32d2d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }
  .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 0; }
  .version-badge { display: inline-flex; align-items: center; flex-shrink: 0; white-space: nowrap; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; color: #fff; background: linear-gradient(135deg, var(--accent), var(--pro-text)); padding: 2px 8px; border-radius: 10px; line-height: 1.4; }
  .section { margin-bottom: 1.5rem; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  input[type=text] { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type=text]:focus { border-color: var(--accent); }
  .tier-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .tier-name { width: 160px; }
  .tier-mask { width: 110px; text-align: center; }
  select { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  select:focus { border-color: var(--accent); }
  .hosts-hint { font-size: 11px; color: var(--text-hint); min-width: 64px; }
  .tgw-tag { font-size: 10px; background: var(--warning-bg); color: var(--warning-text); border-radius: 10px; padding: 2px 7px; white-space: nowrap; }
  .btn { font-size: 13px; padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background 0.1s; }
  .btn:hover { background: var(--surface-alt); }
  .btn-del { color: var(--danger); border-color: var(--danger-border); padding: 4px 8px; display: inline-flex; align-items: center; justify-content: center; }
  .btn-del:hover { background: var(--danger-bg); }
  .btn-del .material-icons { font-size: 18px; }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-primary:hover { opacity: 0.9; }
  .hint-text { font-size: 11px; color: var(--text-hint); margin-bottom: 10px; }
  .error { font-size: 12px; color: var(--danger); }
  .warn { background: var(--warning-bg); color: var(--warning-text); border: 1px solid var(--warning-border); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; margin-bottom: 10px; display: flex; gap: 6px; align-items: flex-start; }
  .info-row { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; }
  .info-card .lbl { font-size: 11px; color: var(--text-hint); }
  .info-card .val { font-size: 15px; font-weight: 500; font-family: var(--mono); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 620px; table-layout: fixed; }
  th { text-align: left; padding: 7px 10px; background: var(--surface-alt); font-size: 11px; font-weight: 500; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-az1 { background: var(--accent-bg); color: var(--accent-text); }
  .badge-az2 { background: var(--pro-bg); color: var(--pro-text); }
  .badge-tail { background: var(--warning-bg); color: var(--warning-text); }
  .badge-fwd { background: var(--accent-bg); color: var(--accent-text); }
  .badge-free { background: var(--success-bg); color: var(--success-text); }
  .mono { font-family: var(--mono); }
  .free-row td { background: var(--success-bg); color: var(--success-text); font-style: italic; font-size: 11px; }
  .note { font-size: 11px; color: var(--text-hint); margin-top: 8px; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; display: inline-block; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; border-radius: 10px; background: var(--border-strong); cursor: pointer; transition: background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform 0.2s; pointer-events: none; }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }
  .free-banner { background: var(--success-bg); border: 1px solid var(--success-border); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--success-text); margin-bottom: 12px; }
  .fb-row { display: flex; gap: 8px; align-items: center; margin-bottom: 2px; }
  .fb-row:last-child { margin-bottom: 0; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .tab-btn { font-size: 13px; padding: 6px 16px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .diagram-wrap { overflow-x: auto; }

  .diagram-header { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .diagram-total { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
  .az-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .az-grid { grid-template-columns: 1fr; } }
  .az-col { display: flex; flex-direction: column; gap: 8px; }
  .az-label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-align: center; margin-bottom: 4px; letter-spacing: 0.04em; }
  .subnet-card { border-radius: 8px; padding: 10px 12px; color: #fff; }
  .subnet-card .sc-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; text-align: center; }
  .subnet-card .sc-cidr { font-size: 12px; font-family: var(--mono); text-align: center; margin-bottom: 2px; opacity: 0.95; }
  .subnet-card .sc-info { font-size: 10px; text-align: center; opacity: 0.8; }
  .free-card { border-radius: 8px; padding: 8px 12px; background: var(--success-bg); border: 1px dashed var(--success-border); }
  .free-card .sc-name { font-size: 11px; font-style: italic; color: var(--success-text); text-align: center; }
  .free-card .sc-info { font-size: 10px; color: var(--success-text); text-align: center; opacity: 0.8; font-family: var(--mono); }
  .diagram-footer { font-size: 11px; color: var(--text-muted); margin-top: 12px; text-align: center; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--success-border); color: #fff; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); opacity: 0; pointer-events: none; transition: opacity 0.4s ease, transform 0.4s ease; z-index: 1000; display: flex; align-items: center; gap: 6px; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .material-icons { font-size: 16px; }
  .site-footer { text-align: center; padding: 1.5rem 0 1rem; color: var(--text-muted); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .site-footer .footer-links { display: flex; align-items: center; gap: 20px; }
  .site-footer a { color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
  .site-footer a:hover { color: var(--text); }
  .site-footer img.footer-icon { width: 14px; height: 14px; border-radius: 2px; }
  .site-footer svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
</style>
</head>
<body>
<div class="page">
  <!-- バージョン表記: 機能追加・変更のたびにマイナーバージョンを+0.1してください (v<メジャー>.<マイナー>) -->

  <div class="section">
    <div class="section-title">VPC設定</div>
    <div class="row">

        <div class="toggle-track"></div><div class="toggle-thumb"></div>

      <span style="font-size:13px;color:var(--text-muted)">TGW末尾割り当て（ティア名に「TGW」を含む場合、VPC末尾から逆算）</span>
    </div>
    <div class="toggle-row">
      <label class="toggle">

        <div class="toggle-track"></div><div class="toggle-thumb"></div>

  <div class="section">
    <div class="section-title">ティア構成</div>

  <div class="divider"></div>
  <button class="btn btn-primary" onclick="calculate()" style="margin-bottom:1.5rem">計算 ↗</button>

<div id="toast" class="toast"><span class="material-icons">check_circle</span><span id="toastMsg"></span></div>

<script>
let tiers = [
  { name: 'Private-App',      mask: 24 },
  { name: 'Public',           mask: 26 },
  { name: 'Private-DB',       mask: 26 },
  { name: 'VPCエンドポイント', mask: 26 },
  { name: 'TGW',              mask: 28 },
];

const TIER_COLORS = [
  '#2d7d4f','#1a6fd4','#5c3d99','#a05c00','#8b2020',
  '#1a7a7a','#6b4c00','#3d5a99','#7a2d6b','#3d7a2d',
];
function tierColor(idx) { return TIER_COLORS[idx % TIER_COLORS.length]; }
function isTgw(name) { return document.getElementById('tgwTailMode').checked && name.includes('TGW'); }

function maskOptions(selected) {
  let opts = '';
  for (let m = 16; m <= 28; m++) {
    const count = Math.pow(2, 32 - m);
    opts += `<option value="${m}" ${m === selected ? 'selected' : ''}>/${m} (${count.toLocaleString()})</option>`;
  }
  return opts;
}

function renderTiers() {
  const tgwOn = document.getElementById('tgwTailMode').checked;
  document.getElementById('tierHint').style.display = tgwOn ? '' : 'none';
  document.getElementById('tierList').innerHTML = tiers.map((t, i) => {
    const h = Math.pow(2, 32 - t.mask) - 5;
    const hint = h > 0 ? `(有効${h}台)` : '';
    const tgwMark = tgwOn && t.name.includes('TGW') ? `<span class="tgw-tag">末尾割り当て</span>` : '';
    return `<div class="tier-row">
      <span style="font-size:12px;color:var(--text-hint);min-width:16px">${i+1}</span>
      <input type="text" class="tier-name" value="${t.name}" onchange="tiers[${i}].name=this.value;renderTiers();" placeholder="ティア名" />
      <span style="font-size:12px;color:var(--text-muted)">/</span>
      <select class="tier-mask" onchange="updateMask(${i},this.value)">${maskOptions(t.mask)}</select>
      <span class="hosts-hint">${hint}</span>
      ${tgwMark}
      <button class="btn btn-del" onclick="delTier(${i})" title="削除"><span class="material-icons">delete</span></button>
    </div>`;
  }).join('');
}

function updateMask(i, val) { tiers[i].mask = parseInt(val) || 24; renderTiers(); }
function addTier() { tiers.push({ name: '新ティア', mask: 28 }); renderTiers(); }
function delTier(i) { tiers.splice(i, 1); renderTiers(); }

function parseVPC(cidr) {
  const m = cidr.trim().match(/^(\d+\.\d+\.\d+\.\d+)\/(\d+)$/);
  if (!m) return null;
  const parts = m[1].split('.').map(Number);
  if (parts.some(p => p < 0 || p > 255)) return null;
  const prefix = parseInt(m[2]);
  if (prefix < 8 || prefix > 28) return null;
  const base = ((parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3]) >>> 0;
  const total = Math.pow(2, 32 - prefix);
  const network = (base & (~((1 << (32 - prefix)) - 1) >>> 0)) >>> 0;
  return { base: network, prefix, total, end: network + total - 1 };
}

function ipToStr(n) { return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'); }
function floorAligned(addr, size) { return Math.floor(addr / size) * size; }

let toastTimer = null;
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = message;
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
}

function calculate(notify = true) {
  const cidr = document.getElementById('vpcCidr').value;
  const vpc = parseVPC(cidr);
  const errEl = document.getElementById('vpcErr');
  if (!vpc) { errEl.textContent = '無効なCIDRです（例: 10.0.0.0/22）'; return; }
  errEl.textContent = '';

  if (tiers.length === 0) { document.getElementById('result').innerHTML = '<div class="warn">ティアを1つ以上追加してください。</div>'; return; }
  for (const t of tiers) {
    if (t.mask <= vpc.prefix || t.mask < 16 || t.mask > 28) {
      document.getElementById('result').innerHTML = `<div class="warn">「${t.name}」のマスク /${t.mask} が不正です（/${vpc.prefix}より大きく /16〜/28 の範囲で指定）。</div>`; return;
    }
  }

  const normalTiers = tiers.filter(t => !isTgw(t.name));
  const tgwTiers    = tiers.filter(t =>  isTgw(t.name));
  const AZS = ['1a', '1c'];
  const allocRows = [];
  let overflow = false;

  let fwdCursor = vpc.base;
  for (const tier of normalTiers) {
    const sz = Math.pow(2, 32 - tier.mask);
    for (let az = 0; az < 2; az++) {
      const aligned = Math.ceil(fwdCursor / sz) * sz;
      const end = aligned + sz - 1;
      if (end > vpc.end) { overflow = true; break; }
      allocRows.push({ kind:'subnet', tier: tier.name, az: AZS[az], azIdx: az,
        cidr: `${ipToStr(aligned)}/${tier.mask}`, first: ipToStr(aligned), last: ipToStr(end),
        total: sz, usable: sz-5, tail: false, startNum: aligned, endNum: end });
      fwdCursor = end + 1;
    }
    if (overflow) break;
  }

  let bwdCursor = vpc.end;
  const tgwBuilt = [];
  for (const tier of [...tgwTiers].reverse()) {
    const sz = Math.pow(2, 32 - tier.mask);
    for (let az = 1; az >= 0; az--) {
      const aligned = floorAligned(bwdCursor - sz + 1, sz);
      const end = aligned + sz - 1;
      if (aligned < vpc.base) { overflow = true; break; }
      tgwBuilt.unshift({ kind:'subnet', tier: tier.name, az: AZS[az], azIdx: az,
        cidr: `${ipToStr(aligned)}/${tier.mask}`, first: ipToStr(aligned), last: ipToStr(end),
        total: sz, usable: sz-5, tail: true, startNum: aligned, endNum: end });
      bwdCursor = aligned - 1;
    }
    if (overflow) break;
  }

  const fwdEnd   = allocRows.length > 0 ? allocRows[allocRows.length-1].endNum : vpc.base - 1;
  const tgwStart = tgwBuilt.length  > 0 ? tgwBuilt[0].startNum               : vpc.end  + 1;
  const collision = allocRows.length > 0 && tgwBuilt.length > 0 && fwdEnd >= tgwStart;
  const allSubnets = [...allocRows, ...tgwBuilt].sort((a,b) => a.startNum - b.startNum);

  const gaps = [];
  let cursor = vpc.base;
  for (const s of allSubnets) {
    if (s.startNum > cursor) gaps.push({ kind:'free', startNum: cursor, endNum: s.startNum-1 });
    cursor = s.endNum + 1;
  }
  if (cursor <= vpc.end) gaps.push({ kind:'free', startNum: cursor, endNum: vpc.end });

  const totalFree = gaps.reduce((a,g) => a+(g.endNum-g.startNum+1), 0);
  const usedCount = vpc.total - totalFree;
  const freePct   = Math.round(totalFree/vpc.total*100);
  const showFree  = document.getElementById('showFree').checked;

  const tableRows = [];
  cursor = vpc.base;
  for (const s of allSubnets) {
    if (showFree && s.startNum > cursor) tableRows.push({ kind:'free', startNum: cursor, endNum: s.startNum-1 });
    tableRows.push(s);
    cursor = s.endNum + 1;
  }
  if (showFree && cursor <= vpc.end) tableRows.push({ kind:'free', startNum: cursor, endNum: vpc.end });

  function buildDiagramColumn(azIdx) {
    const azSubnets = allSubnets.filter(s => s.azIdx === azIdx);
    const events = [...azSubnets, ...(showFree ? gaps : [])];
    events.sort((a,b) => a.startNum - b.startNum);
    return events;
  }

  let warns = '';
  if (overflow) warns += `<div class="warn">⚠️ VPC CIDRの範囲を超えました。VPCのプレフィックスを大きくするか、ティアのマスクを調整してください。</div>`;
  if (collision) warns += `<div class="warn">⚠️ 前詰めサブネットとTGWサブネットのアドレス範囲が重複しています。マスクを見直してください。</div>`;

  const summary = `<div class="info-row">
    <div class="info-card"><div class="lbl">VPC CIDR</div><div class="val">${cidr}</div></div>
    <div class="info-card"><div class="lbl">総アドレス数</div><div class="val">${vpc.total.toLocaleString()}</div></div>
    <div class="info-card"><div class="lbl">割り当て済</div><div class="val">${usedCount.toLocaleString()}</div></div>
    <div class="info-card"><div class="lbl">空き合計</div><div class="val" style="color:var(--success-text)">${totalFree.toLocaleString()} (${freePct}%)</div></div>
  </div>`;

  const freeBanner = (showFree && gaps.length > 0) ? `<div class="free-banner">${gaps.map(g => {
    const cnt = g.endNum-g.startNum+1;
    return `<div class="fb-row"><span class="mono">${ipToStr(g.startNum)} – ${ipToStr(g.endNum)}</span><strong>${cnt.toLocaleString()} アドレス</strong></div>`;
  }).join('')}</div>` : '';

  let tableHTML = `<div class="table-wrap"><table>
    <colgroup><col style="width:18%"><col style="width:6%"><col style="width:17%"><col style="width:14%"><col style="width:14%"><col style="width:9%"><col style="width:9%"><col style="width:9%"></colgroup>
    <thead><tr><th>ティア</th><th>AZ</th><th>CIDR</th><th>先頭アドレス</th><th>末尾アドレス</th><th style="text-align:right">総数</th><th style="text-align:right">有効数</th><th>割り当て</th></tr></thead><tbody>`;
  for (const r of tableRows) {
    if (r.kind === 'free') {
      const cnt = r.endNum-r.startNum+1;
      tableHTML += `<tr style="background:var(--success-bg);color:var(--success-text);font-style:italic;font-size:11px">
        <td colspan="2">空き</td><td class="mono">—</td>
        <td class="mono">${ipToStr(r.startNum)}</td><td class="mono">${ipToStr(r.endNum)}</td>
        <td style="text-align:right" class="mono">${cnt.toLocaleString()}</td>
        <td style="text-align:right" class="mono">—</td>
        <td><span class="badge badge-free">未割当</span></td>
      </tr>`;
    } else {
      tableHTML += `<tr>
        <td style="font-weight:500">${r.tier}</td>
        <td><span class="badge ${r.azIdx===0?'badge-az1':'badge-az2'}">${r.az}</span></td>
        <td class="mono">${r.cidr}</td>
        <td class="mono" style="font-size:11px;color:var(--text-muted)">${r.first}</td>
        <td class="mono" style="font-size:11px;color:var(--text-muted)">${r.last}</td>
        <td style="text-align:right" class="mono">${r.total.toLocaleString()}</td>
        <td style="text-align:right" class="mono">${r.usable.toLocaleString()}</td>
        <td><span class="badge ${r.tail?'badge-tail':'badge-fwd'}">${r.tail?'末尾':'前詰'}</span></td>
      </tr>`;
    }
  }
  tableHTML += `</tbody></table></div><p style="font-size:11px;color:var(--text-hint);margin-top:8px">※ 有効数 = 総数 - 5（AWSの予約アドレス）　※ ティア名に「TGW」を含む場合、末尾から逆算して割り当てます。</p>`;

  const tierNames = [...new Set(allSubnets.map(s => s.tier))];
  const colorMap = {};
  tierNames.forEach((name, i) => { colorMap[name] = tierColor(i); });

  function renderCard(c) {
    if (c.kind === 'free') {
      const cnt = c.endNum-c.startNum+1;
      return `<div class="free-card"><div class="sc-name">空き</div><div class="sc-info">${ipToStr(c.startNum)} – ${ipToStr(c.endNum)}<br>${cnt.toLocaleString()} アドレス</div></div>`;
    }
    const col = colorMap[c.tier] || '#555';
    return `<div class="subnet-card" style="background:${col}"><div class="sc-name">${c.tier}</div><div class="sc-cidr">${c.cidr}</div><div class="sc-info">${c.total.toLocaleString()} addr（有効 ${c.usable.toLocaleString()}）<br>${c.first} – ${c.last}</div></div>`;
  }

  const col0 = buildDiagramColumn(0);
  const col1 = buildDiagramColumn(1);

  const diagramHTML = `<div class="diagram">
    <div class="diagram-header">VPC: ${cidr}</div>
    <div class="diagram-total">${vpc.total.toLocaleString()} addresses</div>
    <div class="az-grid">
      <div class="az-col"><div class="az-label">AZ-a (ap-northeast-1a)</div>${col0.map(renderCard).join('')}</div>
      <div class="az-col"><div class="az-label">AZ-c (ap-northeast-1c)</div>${col1.map(renderCard).join('')}</div>
    </div>
    ${gaps.length>0&&showFree?`<div class="diagram-footer">未割り当て: ${gaps.map(g=>`${ipToStr(g.startNum)} – ${ipToStr(g.endNum)}`).join(' / ')}（将来拡張用）</div>`:''}
  </div>`;

  document.getElementById('result').innerHTML = `
    ${warns}${summary}${freeBanner}
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="table" onclick="switchTab('table')">表</button>
      <button class="tab-btn" data-tab="diagram" onclick="switchTab('diagram')">図</button>
    </div>
    <div class="tab-panel active" data-panel="table">${tableHTML}</div>
    <div class="tab-panel" data-panel="diagram"><div class="diagram-wrap">${diagramHTML}</div></div>
  `;

  if (notify) showToast('計算しました');
}

renderTiers();
calculate(false);
</script>
</body>
</html>
